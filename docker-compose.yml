services:
  api-yt-dlp:
    build:
      context: .
      dockerfile: api/Dockerfile
      args:
        # defaults publicos; sobrescreva via env p/ build interno (Nexus):
        #   BASE_IMAGE=docker-cache.packtudo.com/library/python:3.12-slim \
        #   APT_MIRROR=https://pack-nexus.packtudo.com/repository \
        #   PIP_INDEX_URL=https://pack-nexus.packtudo.com/repository/pypi-proxy/simple docker compose build
        BASE_IMAGE: ${BASE_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        APT_MIRROR: ${APT_MIRROR:-}
    environment:
      DOWNLOAD_DIR: /downloads
      COOKIES_DIR: /cookies
      MAX_WORKERS: "2"
      COOKIE_WARN_DAYS: "7"
      # CORS_ORIGINS: "*"   # descomente se chamar a API de outra origem
    volumes:
      - ./downloads:/downloads
      - ./cookies:/cookies                       # cookies GRAVAVEIS (renovar pela UI)
      - ./frontend:/app/frontend:ro              # frontend servido em /
      - ./api/app.py:/app/app.py
      # legados (read-only) — fallback de cookies para deploys antigos:
      - ./www.tiktok.com_cookies.txt:/app/www.tiktok.com_cookies.txt:ro
      - ./www.youtube.com_cookies.txt:/app/www.youtube.com_cookies.txt:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - packtudo_default

networks:
  packtudo_default:
    external: true
