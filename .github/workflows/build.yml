name: build

# Valida que a imagem builda com os defaults PUBLICOS (docker.io / pypi.org).
# Nao publica em registry — so garante que qualquer um consegue buildar.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (public defaults)
        run: docker build -f api/Dockerfile -t ytdlp-api:ci .
