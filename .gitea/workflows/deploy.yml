name: Deploy ytdlp api

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "${{ secrets.REGISTRY_URL }}" -u "${{ secrets.REGISTRY_USER }}" --password-stdin

      - name: Build image
        run: |
          # Valores internos vem de Gitea repo variables (nao ficam no codigo).
          # Fallback publico se a variable nao existir -> build ainda funciona.
          BASE_IMAGE="${{ vars.BASE_IMAGE }}";       BASE_IMAGE="${BASE_IMAGE:-python:3.12-slim}"
          PIP_INDEX_URL="${{ vars.PIP_INDEX_URL }}"; PIP_INDEX_URL="${PIP_INDEX_URL:-https://pypi.org/simple}"
          APT_MIRROR="${{ vars.APT_MIRROR }}"
          docker build -f api/Dockerfile \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg PIP_INDEX_URL="$PIP_INDEX_URL" \
            --build-arg APT_MIRROR="$APT_MIRROR" \
            -t "${{ secrets.REGISTRY_URL }}/packtudo/ytdlp-api:latest" .
          docker tag "${{ secrets.REGISTRY_URL }}/packtudo/ytdlp-api:latest" "${{ secrets.REGISTRY_URL }}/packtudo/ytdlp-api:${{ gitea.sha }}"

      - name: Push image
        run: |
          docker push "${{ secrets.REGISTRY_URL }}/packtudo/ytdlp-api:latest"
          docker push "${{ secrets.REGISTRY_URL }}/packtudo/ytdlp-api:${{ gitea.sha }}"

      - name: Trigger Coolify deploy
        run: |
          curl -fsSL -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "${{ secrets.COOLIFY_WEBHOOK }}"
